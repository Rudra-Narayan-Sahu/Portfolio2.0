<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F0D"/>
      <stop offset="100%" stop-color="#0a1a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ddc84"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ddc84" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3ddc84" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Glow behind R -->
  <circle cx="32" cy="32" r="22" fill="url(#glow)"/>
  <!-- Bracket left -->
  <path d="M18 22L12 32l6 10" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- R letter -->
  <text x="33" y="43" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="-1">R</text>
  <!-- Bracket right -->
  <path d="M46 22l6 10-6 10" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Dot -->
  <circle cx="51" cy="53" r="2.5" fill="#3ddc84" opacity="0.8"/>
  <!-- Border ring -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.15"/>
</svg>
